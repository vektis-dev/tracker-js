name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      # Pin npm to latest. Release workflow needs npm >=11.5.1 for OIDC publish;
      # CI runs `npm publish --dry-run` for tarball verification — match versions
      # across both jobs to avoid surprises between dry-run and real publish.
      - run: npm install -g npm@latest

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Build (tsup + skills bundle)
        run: npm run build

      - name: Smoke build (verify dist artifacts + skills bundle)
        run: npm run smoke

      - name: Bundle size check
        run: npm run size

      - name: Publish dry-run (verifies tarball contents)
        # npm refuses to publish a prerelease version (e.g., 1.0.0-rc.1) without
        # an explicit --tag, to avoid accidentally aliasing 'latest' to a prerelease.
        # Mirror the same logic the release workflow uses: prerelease → --tag rc;
        # stable → default (latest).
        #
        # Guard: skip when the version in package.json is already published.
        # `npm publish --dry-run` validates the tarball would be acceptable to
        # npm — including the "version not yet taken" check — so it always
        # fails on a PR that doesn't bump the version. The dry-run is most
        # valuable on version-bumping PRs (catches bad tarball contents
        # before tagging); on no-op PRs (docs, CI tweaks, dep bumps) we have
        # nothing to validate against npm anyway, so the skip is safe.
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${VERSION}" version > /dev/null 2>&1; then
            echo "Version $VERSION already published — skipping dry-run."
            echo "Bump version in package.json on the PR that ships the next release."
            exit 0
          fi
          if [[ "$VERSION" == *-* ]]; then
            echo "Prerelease version $VERSION detected; using --tag rc"
            npm publish --dry-run --tag rc
          else
            echo "Stable version $VERSION; using default tag (latest)"
            npm publish --dry-run
          fi
