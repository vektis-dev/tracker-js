# Integration test job. Boots a vanalytics stack via services-block (Postgres
# 18 + Redis 7) on a dispatched run or a push to main. Skipped on every PR
# because vanalytics setup takes ~30s and the contract test (in ci.yml) catches
# schema drift earlier.
#
# Cross-repo auth: the vanalytics clone uses a short-lived installation token
# minted by the `vektis-ci-vanalytics-clone` GitHub App (org-owned, scoped
# Contents:Read on vanalytics only). App credentials are stored as repo
# secrets VANALYTICS_APP_ID and VANALYTICS_APP_PRIVATE_KEY. See VEK-401.

name: Integration

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  integration-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: vanalytics
          POSTGRES_PASSWORD: vanalytics
          POSTGRES_DB: vanalytics
        ports: [5432:5432]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports: [6379:6379]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm install -g npm@latest

      - run: npm ci

      - name: Mint vanalytics access token
        id: vanalytics-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.VANALYTICS_APP_ID }}
          private-key: ${{ secrets.VANALYTICS_APP_PRIVATE_KEY }}
          owner: vektis-dev
          repositories: vanalytics

      - name: Boot vanalytics
        env:
          DATABASE_URL: postgresql://vanalytics:vanalytics@localhost:5432/vanalytics
          REDIS_URL: redis://localhost:6379
          ANALYTICS_INTERNAL_SECRET: ci-internal-secret-do-not-use-in-prod
          PORT: '3333'
          VANALYTICS_TOKEN: ${{ steps.vanalytics-token.outputs.token }}
        run: |
          git clone "https://x-access-token:${VANALYTICS_TOKEN}@github.com/vektis-dev/vanalytics.git" /tmp/vanalytics
          cd /tmp/vanalytics
          # vanalytics is NOT a yarn workspace — root install only hydrates
          # root deps (husky). Server deps (knex, tsx, express, ...) need a
          # separate install in server/. Previously masked because the old
          # `yarn dev:full` was docker-compose, which ran install inside
          # each service container.
          yarn install --frozen-lockfile
          cd server
          yarn install --frozen-lockfile
          # Migrate + seed against the services-block Postgres. Seed creates
          # the test API key (vek_test_pk_local_playground) + test org used by
          # the integration tests below — without it, every request 401s.
          yarn db:migrate
          yarn knex seed:run
          # Run the API directly (yarn dev = nodemon → tsx ./src/index.ts,
          # binds to PORT=3333). Backgrounded; survives into the next step.
          yarn dev &
          for i in {1..30}; do
            if curl -sf http://localhost:3333/api/v1/health > /dev/null; then
              echo "vanalytics ready"
              break
            fi
            sleep 1
          done
          # Hard-fail if vanalytics never came up. Without this the loop exits
          # cleanly even when nothing is listening, masking boot failures as
          # downstream test failures (see VEK-401 first end-to-end run for an
          # example of this misdirection).
          curl -sf http://localhost:3333/api/v1/health > /dev/null \
            || { echo "::error::vanalytics did not become ready within 30s — boot failed silently"; exit 1; }

      - name: Run integration tests
        env:
          TRACKER_INTEGRATION: '1'
          TRACKER_VANALYTICS_URL: http://localhost:3333
          TRACKER_VANALYTICS_TEST_KEY: vek_test_pk_local_playground
          TRACKER_VANALYTICS_ORG_ID: '00000000-0000-4000-8000-000000000001'
          TRACKER_VANALYTICS_INTERNAL_SECRET: ci-internal-secret-do-not-use-in-prod
        run: npm run test:integration
